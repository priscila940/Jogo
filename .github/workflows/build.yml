name: Compilar Jogo em Executavel

on:
  push:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar Dependências do Python
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pygame

    - name: Compilar o executável (.exe) direto pelo terminal
      run: |
        pyinstaller --onefile --name=GlitchOut glitch_out.py

    - name: Salvar o Executavel Pronto (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Jogo-GlitchOut-Windows
        path: dist/GlitchOut.exe
